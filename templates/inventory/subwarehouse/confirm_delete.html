{% extends "base.html" %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h4>تأكيد الحذف</h4>
                </div>
                <div class="card-body">
                    <p>
                        هل أنت متأكد من حذف المخزن الفرعي "<strong>{{ object.name }}</strong>"؟
                    </p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">نعم، احذف</button>
                        <a href="{% url 'subwarehouse_list' %}" class="btn btn-secondary">إلغاء</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
