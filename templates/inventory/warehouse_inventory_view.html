<!-- templates/inventory/warehouse_inventory_view.html -->
{% extends "base.html" %}
{% load static %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">
            كشف المخزون حسب المخزن
        </h2>
        <div class="d-flex gap-2">
            <a href="#" id="export-excel-btn" class="btn btn-success">
                <i class="bi bi-file-earmark-excel"></i> Excel
            </a>
            <a href="#" id="export-pdf-btn" class="btn btn-danger">
                <i class="bi bi-file-earmark-pdf"></i> PDF
            </a>
        </div>
             </div>
    <div class="row g-3 mb-4">
        <!-- Sub-Warehouse -->
        <div class="col-md-4">
            <label for="warehouse_id" class="form-label">
                <i class="bi bi-building me-1"></i> المخزن الفرعي
            </label>
            <select id="warehouse_id"
                    name="warehouse_id"
                    class="form-select"
                    hx-get="{% url 'categories_by_warehouse' %}"
                    hx-target="#category-container"
                    hx-trigger="change">
                <option value="">
                    اختر مخزن...
                </option>
                {% for wh in sub_warehouses %}
                    <option value="{{ wh.id }}"
                            data-warehouse-name="{{ wh.warehouse.name }}"
                            data-sub-warehouse-name="{{ wh.name }}">
                        {{ wh.name }} ({{ wh.warehouse.name }})
                    </option>
                {% endfor %}
            </select>
        </div>
        <!-- Category (loaded via HTMX) -->
        <div class="col-md-4" id="category-container">
            <label class="form-label">
                <i class="bi bi-tags me-1"></i> الفئة
            </label>
            <select id="category_id" name="category_id" class="form-select" disabled>
                <option>
                    اختر مخزن أولاً
                </option>
            </select>
        </div>
    </div>
    <!-- Items Table -->
    <div id="items-container">
        <div class="alert alert-info">
            <i class="bi bi-info-circle me-2"></i>
            اختر مخزن ثم فئة لعرض الأصناف والكميات.
        </div>
    </div>
{% endblock content %}
{% block scripts %}
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            const excelBtn = document.getElementById('export-excel-btn');
            const pdfBtn   = document.getElementById('export-pdf-btn');

            const BASE_EXCEL = "{% url 'export_inventory_excel' %}";
            const BASE_PDF   = "{% url 'export_inventory_pdf' %}";

            function updateExportUrls() {
                const warehouseId  = document.getElementById('warehouse_id')?.value  || '';
                // Category select is injected by HTMX — look it up fresh every time
                const categoryId   = document.getElementById('category_id')?.value   || '';

                const params = new URLSearchParams();
                if (warehouseId) params.set('warehouse_id', warehouseId);
                if (categoryId)  params.set('category_id',  categoryId);

                const qs = params.toString();
                excelBtn.href = BASE_EXCEL + (qs ? '?' + qs : '');
                pdfBtn.href   = BASE_PDF   + (qs ? '?' + qs : '');
            }

            // Warehouse select change
            document.getElementById('warehouse_id')
                .addEventListener('change', updateExportUrls);

            // After HTMX injects the category dropdown, wire it up
            document.addEventListener('htmx:afterSettle', function (evt) {
                if (evt.detail.target.id === 'category-container') {
                    const categorySelect = document.getElementById('category_id');
                    if (categorySelect) {
                        categorySelect.addEventListener('change', updateExportUrls);
                    }
                    updateExportUrls();
                }
            });

            // Initial state
            updateExportUrls();
        });
    </script>
{% endblock scripts %}
