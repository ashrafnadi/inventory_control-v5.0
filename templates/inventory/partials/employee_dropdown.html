<!-- inventory/partials/employee_dropdown.html -->
{% if employees %}
    <label class="form-label fw-bold">اختر الموظف</label>
    <select name="employee_id" class="form-select" onchange="this.form.submit()">
        <option value="">-- اختر الموظف --</option>
        {% for e in employees %}<option value="{{ e.id }}">{{ e.get_full_name|default:e.username }}</option>{% endfor %}
    </select>
{% endif %}
