<!-- templates/inventory/partials/employee_select_for_custody.html -->
{% if employees %}
    <label for="id_employee" class="form-label">
        اختر الموظف
    </label>
    <select id="id_employee"
            name="employee_id"
            class="form-select"
            hx-get="{% url 'employee_custody' %}"
            hx-include="#id_department"
            hx-target="#employee-custody-container"
            hx-push-url="true">
        <option value="">
            اختر موظف...
        </option>
        {% for emp in employees %}
            <option value="{{ emp.id }}"
                    {% if emp.id|stringformat:"s" == selected_employee_id %}
                        selected
                    {% endif %}>
                {{ emp.get_full_name|default:emp.username }}
            </option>
        {% endfor %}
    </select>
{% else %}
    <label class="form-label">
        اختر الموظف
    </label>
    <select class="form-select" disabled>
        <option>
            لا يوجد موظفين في هذا القسم
        </option>
    </select>
{% endif %}
