<!-- inventory/warehouse_form.html -->
{% extends "base.html" %}
{% load widget_tweaks %}
{% block content %}
    <div class="container mt-4">
        <h4>
            {{ title }}
        </h4>
        <form method="post">
            {% csrf_token %}
            <div class="card p-4">
                {% for field in form %}
                    <div class="mb-3">
                        {{ field.label_tag }}
                        {{ field|add_class:"form-control" }}
                        {% if field.errors %}
                            <div class="text-danger">
                                {{ field.errors }}
                            </div>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-success">
                    <i class="bi bi-save"></i> حفظ
                </button>
                <a href="{% if 'warehouse' in request.path %}{% url 'warehouse_list' %}{% else %}{% url 'itemcategory_list' %}{% endif %}"
                   class="btn btn-secondary">
                    إلغاء
                </a>
            </div>
        </form>
    </div>
{% endblock content %}
