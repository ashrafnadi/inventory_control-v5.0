{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Login Page" />
        <meta name="keywords" content="Login Page" />
        <meta name="author" content="Your Name" />
        <link rel="icon" href="{% static 'img/bu_logo.png' %}" />
        <title>{{ LOGIN_PAGE_TITLE|default:'Login Page' }}</title>
        <!-- Bootstrap 5 RTL CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css"
              rel="stylesheet" />
        <!-- Bootstrap Icons -->
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" />
        <link rel="stylesheet" href="{% static 'css/login.css' %}" />
        <style>
            .bg-image-container {
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                min-height: 100vh;
                background-image: url('{% static "img/bg.jpg" %}');
            }

            .overlay {
                background-color: rgba(0, 0, 0, 0.6);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }
        </style>
    </head>
    <body class="bg-image-container">
        <div class="overlay">
            <!-- Display Django messages as Bootstrap alerts -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert {{ message.tags }} alert-dismissible fade show"
                         role="alert">
                        {{ message }}
                        <button type="button"
                                class="btn-close"
                                data-bs-dismiss="alert"
                                aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
            <div class="container d-flex align-items-center justify-content-center flex-grow-1 py-4">
                <div class="card">
                    <!-- make the images vertical -->
                    <!-- card-body login-card p-5 -->
                    <!-- make the images horizontal -->
                    <div class="card-body login-card">
                        <div class="text-center mb-2 d-flex justify-content-center">
                            <img src="{% static 'img/bu_logo.png' %}"
                                 alt="Company Logo"
                                 class="img-fluid logo"
                                 height="100px"
                                 width="auto" />
                            <img src="{% static 'img/bedaya.png' %}"
                                 alt="Bedaya Logo"
                                 height="100px"
                                 width="auto" />
                        </div>
                        <h3 class="text-center mb-4 fw-bold">{{ APPLICATION_NAME }}</h3>
                        <h5 class="text-center mb-4 fw-bold">تسجيل الدخول</h5>
                        <form method="post" action="{% url 'login' %}">
                            {% csrf_token %}
                            <div class="mb-3">
                                <input type="text"
                                       class="form-control input-opaque"
                                       id="username"
                                       name="username"
                                       placeholder="اسم المستخدم"
                                       required />
                            </div>
                            <div class="mb-3">
                                <input type="password"
                                       class="form-control input-opaque"
                                       id="password"
                                       name="password"
                                       placeholder="كلمة المرور"
                                       required />
                            </div>
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">تسجيل الدخول</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <!-- Footer -->
            <div class="footer mt-auto text-white text-center p-2">{% include "partials/_footer.html" %}</div>
        </div>
        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
