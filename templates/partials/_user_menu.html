<div class="user-dropdown dropdown mx-1">
    <button class="btn dropdown-toggle d-flex align-items-center" role="button" data-bs-toggle="dropdown"
        aria-expanded="false">
        <span>
            مرحبا,
            {{ request.user.first_name }} -
            {% if request.session.user_type == 'inventory_employee' %}
            موظف مخزن
            {% elif request.session.user_type == 'inventory_manager' %}
            مدير مخازن
            {% elif request.session.user_type == 'admin' %}
            مدير نظام
            {% elif request.session.user_type == 'administration_manager' %}
            مدير إدارة
            {% elif request.session.user_type == 'faculty_manager' %}
            مدير كلية
            {% elif request.session.user_type == 'user' %}
            موظف
            {% endif %}
            {{ user_faculty.name }}
        </span>
    </button>
    <ul class="dropdown-menu">
        <li>
            <a class="dropdown-item btn btn-warning" href="{% url 'password_change' %}">
                <i class="bi bi-person me-2"></i>
                تغيير كلمة المرور
            </a>
        </li>
        <li>
            <hr class="dropdown-divider" />
        </li>
        {% if is_postgres and request.user.is_superuser %}
        <li>

            <form method="post" action="{% url 'admin_backup_db' %}" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="dropdown-item btn btn-outline-success me-2"
                    onclick="return confirm('هل تريد إنشاء نسخة احتياطية الآن؟')">
                    <i class="bi bi-database-down"></i> نسخ احتياطي
                </button>
            </form>

        </li>
        <li>
            <hr class="dropdown-divider" />
        </li>
        {% endif %}
        <li>
            <a class="dropdown-item text-danger" href="{% url 'logout' %}">
                <i class="bi bi-box-arrow-right me-2"></i>
                تسجيل الخروج
            </a>
        </li>
    </ul>
</div>
