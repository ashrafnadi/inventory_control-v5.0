<div>
    {% if is_postgres and request.user.is_superuser %}
        <form method="post" action="{% url 'admin_backup_db' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit"
                    class="btn btn-outline-success me-2"
                    onclick="return confirm('هل تريد إنشاء نسخة احتياطية الآن؟')">
                <i class="bi bi-database-down"></i> نسخ احتياطي
            </button>
        </form>
    {% endif %}
</div>
<div>
    <a class="text-danger" href="{% url 'logout' %}">
        <i class="bi bi-box-arrow-right me-2"></i>
        تسجيل الخروج
    </a>
</div>
