{% extends "base.html" %}
{% load widget_tweaks %}
{% block title %}
    {{ title }}
{% endblock title %}
{% block content %}
    <div class="card">
        <div class="card-header">
            <h3>{{ title }}</h3>
        </div>
        <div class="card-body">
            <form method="post" dir="rtl">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">اسم القسم</label>
                    {{ form.name|add_class:"form-control"|attr:"dir:rtl" }}
                    {% if form.name.errors %}<div class="text-danger">{{ form.name.errors }}</div>{% endif %}
                </div>
                <div class="mb-3">
                    <label class="form-label">الكلية</label>
                    <input type="text" class="form-control" value="{{ faculty.name }}" disabled />
                </div>
                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> حفظ
                    </button>
                    <a href="{% url 'department_list' %}" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> إلغاء
                    </a>
                </div>
            </form>
        </div>
    </div>
{% endblock content %}
